name: golangci-lint
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  golangci-lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4
      - uses: aquaproj/aqua-installer@v2.3.0
        with:
          aqua_version: v2.23.1
      - run: |
          golangci-lint run --out-format=github-actions
